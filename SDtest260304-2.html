<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SD English Web版</title>
<style>
  :root{
    --bg:#0b1220; --card:#111a2b; --text:#e6eef8; --muted:#b6c2d9; --accent:#4f8cff; --ok:#20c997; --ng:#ff6b6b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif}
  header{position:sticky;top:0;background:linear-gradient(180deg,#0b1220,#0b1220cc);backdrop-filter:saturate(1.1) blur(4px);z-index:10;border-bottom:1px solid #1b2740}
  .wrap{max-width:1100px;margin:0 auto;padding:14px 16px}
  h1{margin:0 0 8px;font-size:20px;font-weight:700}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  select,button,label,input[type=file]{background:#0f1a30;color:var(--text);border:1px solid #22345a;border-radius:10px;padding:10px 12px;font-size:14px}
  button{cursor:pointer}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .toggle{display:inline-flex;align-items:center;gap:6px;padding:8px 10px;border-radius:999px;background:#0f1a30;border:1px solid #22345a}
  .grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:16px}
  @media(min-width:1000px){ .grid{grid-template-columns:1.2fr .8fr} }
  .card{background:var(--card);border:1px solid #1b2740;border-radius:16px;padding:16px;box-shadow:0 6px 24px rgba(0,0,0,.2)}
  .card h2{margin:0 0 10px;font-size:16px;color:#cfe0ff}
  .muted{color:var(--muted)}
  ol{margin:0;padding-left:22px}
  .qrow{margin:10px 0 18px}
  .answerBox{margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .answer-input{flex:1;min-width:300px;background:#0f1a30;color:var(--text);border:1px solid #22345a;border-radius:10px;padding:12px 14px;font-size:16px}
  .answer-input:disabled{opacity: .7;cursor: not-allowed;}
  .pill{font-size:12px;border-radius:999px;padding:4px 10px;border:1px solid #22345a;background:#0f1a30;color:#9fb6e8}
  .correct{border-color:var(--ok)!important; box-shadow:0 0 0 2px rgba(32,201,151,.25)}
  .incorrect{border-color:var(--ng)!important; box-shadow:0 0 0 2px rgba(255,107,107,.25)}
  .model{margin-top:6px;padding:8px 10px;border-radius:10px;background:#0f1a30;border:1px dashed #203258;color:#cfe0ff}
  .hidden{display:none !important;}

  /* Word Bank レイアウト（親は配置のみ担当） */
  #bankArea{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  /* トークンは見た目を担当 */
  .token{
    font-size:18px;              /* 文字サイズをここで管理 */
    padding:8px 14px;            /* 押しやすくする */
    background:#0f1a30;
    color:var(--text);
    border:1px solid #22345a;
    border-radius:999px;
    cursor:pointer;
    user-select:none;
  }
  .token:active{ transform:scale(0.98); }


  /* 小問リストの「1. 2. 3.」を一時的に非表示（通し番号だけ見せる） */
  #questionList{ list-style: none; padding-left: 0; }
  #questionList > li::marker{ content: ""; }


  /* ===== UNITナビ ===== */
  .unitNav{
    margin-top:10px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .unitBtn{
    background:#0f1a30;
    color:var(--text);
    border:1px solid #22345a;
    border-radius:999px;
    padding:6px 10px;
    font-size:13px;
    cursor:pointer;
    user-select:none;
  }
  .unitBtn.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .unitBtn:active{ transform:scale(0.98); }
  
    /* スピーカーアイコン */
  .spk{
    background:#0f1a30;
    color:var(--text);
    border:1px solid #22345a;
    border-radius:10px;
    padding:8px 10px;
    cursor:pointer;
    user-select:none;
    line-height:1;
    font-size:16px;
  }
  .spk:active{ transform:scale(0.98); }
  .spk[disabled]{
    opacity:.6;
    cursor:not-allowed;
  }

</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>SD English Web版 <span class="pill">不正解のみ正解表示／Aキー無効</span></h1>
    <div class="toolbar">
      <button id="prevBtn">← 前の大問</button>
      <select id="daimonSelect" title="大問を選択"></select>
      <button id="nextBtn">次の大問 →</button>
      <span class="pill" id="countBadge"></span>
      <span style="flex:1"></span>
      <label class="toggle"><input type="checkbox" id="showBank" checked>使える語</label>
      <label class="toggle"><input type="checkbox" id="showHint" checked>ヒント</label>
      <label class="toggle"><input type="checkbox" id="numReset">番号を1から振る</label>
      <label class="toggle"><input type="checkbox" id="voiceOn" checked>音声</label>
      <select id="voiceSelect" title="英語音声を選択"></select>
      <input type="file" id="fileInput" accept=".json" />
      <button id="checkBtn" class="primary">この大問を採点</button>
      <button id="clearBtn">入力をクリア</button>
      <button id="printBtn">印刷</button>
    </div>

    <!-- ★ここに追加 -->
    <div id="unitNav" class="unitNav"></div>
  </div>
</header>

<main class="wrap">
  <div class="grid">
    <section class="card">
      <h2 id="titleArea">大問</h2>
      <div class="muted" id="descArea"></div>

      <!-- ★追加：やり方 -->
      <div class="muted" id="howtoArea" style="margin-top:6px;"></div>

      <ol id="questionList"></ol>
    </section>

    <aside class="card">
      <h2>使える語（Word Bank）</h2>
      <div id="bankArea" class="muted"></div>
      <h2 style="margin-top:14px">ヒント</h2>
      <div id="hintArea" class="muted"></div>
      <div class="muted" style="margin-top:14px">
        前後移動：←/→ ／ 採点：Ctrl/⌘ + Enter
      </div>
      <div class="muted" id="scoreArea" style="margin-top:10px"></div>
    </aside>
  </div>
</main>

// voices は読み込みタイミングが遅い場合があるので、イベントで更新
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  if(!vs || vs.length===0) return;
  // まず en-US 系、なければ en 系、なければ先頭
  ttsVoice = vs.find(v => /en[-_]?US/i.test(v.lang))
          || vs.find(v => /^en/i.test(v.lang))
          || vs[0] || null;
}

if ('speechSynthesis' in window){
  pickVoice();
  populateVoiceSelect(); // ★追加
  speechSynthesis.onvoiceschanged = ()=>{
  pickVoice();
  populateVoiceSelect();
  };
}

function populateVoiceSelect(){
  if(!qs.voiceSelect) return;
  if(!('speechSynthesis' in window)) return;

  const vs = speechSynthesis.getVoices() || [];

  // 英語の声だけ（優先：en-US → en-*）
  const enVoices = vs.filter(v => /^en/i.test(v.lang));
  // 表示用に並び替え（en-US優先 → 名前順）
  enVoices.sort((a,b)=>{
    const aus = /en[-_]?US/i.test(a.lang) ? 0 : 1;
    const bus = /en[-_]?US/i.test(b.lang) ? 0 : 1;
    if(aus !== bus) return aus - bus;
    return (a.name || '').localeCompare(b.name || '');
  });

  // optionを作り直し
  qs.voiceSelect.innerHTML = '';

  // 先頭に「自動」を置く
  const autoOpt = document.createElement('option');
  autoOpt.value = '';
  autoOpt.textContent = '（自動）';
  qs.voiceSelect.appendChild(autoOpt);

  enVoices.forEach((v, i)=>{
    const opt = document.createElement('option');
    opt.value = String(i); // enVoices配列のindex
    opt.textContent = `${v.name} [${v.lang}]${v.default ? ' ★' : ''}`;
    qs.voiceSelect.appendChild(opt);
  });

  // いま選択中の声があるなら、それっぽいものを選択表示
  // （一致する name+lang を探す）
  if(ttsVoice){
    const idx = enVoices.findIndex(v => v.name===ttsVoice.name && v.lang===ttsVoice.lang);
    qs.voiceSelect.value = (idx >= 0) ? String(idx) : '';
  }else{
    qs.voiceSelect.value = '';
  }

  // changeイベント：選択に応じて ttsVoice を固定
  qs.voiceSelect.onchange = ()=>{
    const val = qs.voiceSelect.value;
    if(val === ''){
      // 自動に戻す
      ttsVoice = null;
      pickVoice(); // 既存の自動選択ロジック
      return;
    }
    const v = enVoices[Number(val)];
    if(v) ttsVoice = v;
  };
}

// 句読点前後など、読み上げ用に軽く整形（採点のnormalizeとは別）
function normalizeTTS(text){
  if(!text) return '';
  let t = text.replace(/\u3000/g,' ').trim();
  t = t.replace(/[’]/g, "'");            // カーブ→直線
  t = t.replace(/\s+([.,!?])/g,'$1');    // 句読点の前スペース削除
  t = t.replace(/\s+/g,' ');
  return t;
}

function speak(text){
  if(!voiceEnabled) return;
  if(!('speechSynthesis' in window)) return;

  const t = normalizeTTS(text);
  if(!t) return;

  // 前の読み上げを止める
  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(t);
  u.lang = ttsLang;
  u.rate = ttsRate;
  u.pitch = ttsPitch;
  if(ttsVoice) u.voice = ttsVoice;

  speechSynthesis.speak(u);
}


function numFmt(n){ return String(n).padStart(2,'0'); }
function keyFor(i){ return `${idx}-${i}`; }

// ゆるめ照合（末尾ピリオド/句読点と前後スペースを正規化して一致させる）
function normalize(s){
  if(!s) return "";
  let t = s.replace(/\u3000/g, " ").trim();      // 全角空白→半角 & 先頭末尾トリム
  t = t.replace(/[’]/g, "'");                 // ★ここを追加
  t = t.replace(/\s+([.,!?])/g, "$1");           // 句読点の直前スペースを削除（"word ."→"word."）
  t = t.replace(/[.。!?]+$/,"").trim();          // 文末の句読点を削除 → もう一度トリム
  t = t.replace(/\s+/g, " ");                    // 連続スペースを1つに
  return t.toLowerCase();
}

function populateSelect(){
  qs.daimonSelect.innerHTML = "";

  // 表示対象が未構築なら作る
  if(!viewIndices || viewIndices.length===0) rebuildView();

  viewIndices.forEach((realIdx)=>{
    const d = data[realIdx];
    const opt = document.createElement('option');
    opt.value = realIdx;                 // ★実データのidxを入れる
    opt.textContent = d.title;           // 先に 01. を消した仕様のまま
    qs.daimonSelect.appendChild(opt);
  });

  qs.daimonSelect.value = idx;
  qs.countBadge.textContent = `全${viewIndices.length}大問`; // フィルタ後の件数
}

function rebuildView(){
  // unitFilter が null なら全件
  viewIndices = data
    .map((d,i)=>({d,i}))
    .filter(x => unitFilter==null ? true : (String(x.d.unit||"") === String(unitFilter)))
    .map(x => x.i);

  if(viewIndices.length === 0){
    // フィルタで0件になったら全件に戻す
    unitFilter = null;
    viewIndices = data.map((_,i)=>i);
  }

  // 現在 idx が view 内にあればその位置へ、なければ先頭
  const p = viewIndices.indexOf(idx);
  viewPos = (p >= 0) ? p : 0;
  idx = viewIndices[viewPos];
}

function buildUnitNav(){
  const units = Array.from(new Set(
    data.map(d => d.unit).filter(u => u !== undefined && u !== null && u !== "")
  ));

  // 数字っぽいなら昇順
  units.sort((a,b)=>{
    const na = Number(a), nb = Number(b);
    if(!Number.isNaN(na) && !Number.isNaN(nb)) return na-nb;
    return String(a).localeCompare(String(b));
  });

  qs.unitNav.innerHTML = "";

  // ALL
  const allBtn = document.createElement('button');
  allBtn.type = 'button';
  allBtn.className = 'unitBtn' + (unitFilter==null ? ' active' : '');
  allBtn.textContent = 'ALL';
  allBtn.addEventListener('click', ()=>{
    unitFilter = null;
    rebuildView();
    populateSelect(); // プルダウン更新
    render();         // 画面更新
  });
  qs.unitNav.appendChild(allBtn);

  units.forEach(u=>{
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'unitBtn' + (String(unitFilter)===String(u) ? ' active' : '');
    b.textContent = `UNIT${u}`;
    b.addEventListener('click', ()=>{
      unitFilter = u;
      rebuildView();
      populateSelect();
      render();
    });
    qs.unitNav.appendChild(b);
  });
}

function insertAtCaret(inp, token){
  if(!inp) return;
  const s = inp.selectionStart ?? inp.value.length;
  const e = inp.selectionEnd   ?? inp.value.length;
  const v = inp.value;

  let before = v.slice(0, s);
  let after  = v.slice(e);

  const isPunct = token === '.' || token === ',' || token === '?';

  // ★ 追加：1語目なら先頭を大文字にする
  const isFirstWord = !inp.value.trim();
  if (isFirstWord && /^[a-z]/.test(token)) {
    token = token.charAt(0).toUpperCase() + token.slice(1);
  }

  // ★ 追加：句読点を挿入するときだけ、直前の空白を除去してくっつける
  if (isPunct) before = before.replace(/\s+$/,'');

  // 単語の前：句読点以外は必要なら1スペース
  const leftSpace  = (!isPunct && before && !before.endsWith(' ')) ? ' ' : '';

  // 単語の後：常に次語のためにスペースを1つ（すでに after が空白で始まっていれば追加しない）
  const rightSpace = (after.startsWith(' ')) ? '' : ' ';

  const add = leftSpace + token + rightSpace;
  inp.value = before + add + after;

  const pos = (before + add).length;
  inp.setSelectionRange(pos, pos);
  inp.focus();
  inp.dispatchEvent(new Event('input'));
}

function clamp(){ if(idx<0) idx=0; if(idx>=data.length) idx=data.length-1; }

function doJudge(){
  const d = data[idx];
  let correct = 0; const total = d.problems.length;
  d.problems.forEach((p,i)=>{
    const key = keyFor(i);
    const u = normalize(answers[key]||'');
    const g = normalize(p.en||'');
    const ok = (u.length>0) && (u===g);
    judged[key] = ok ? 'correct' : 'incorrect';

    const input = qs.questionList.querySelector(`.answer-input[data-idx="${i}"]`);
    const model = input?.parentElement?.parentElement?.querySelector('.model');
    if(input){
      input.classList.remove('correct','incorrect');
      input.classList.add(ok ? 'correct' : 'incorrect');
    }
    if(model){
      if(ok){ model.classList.add('hidden'); }
      else{
        model.classList.remove('hidden');
        const span = model.querySelector('span');
        if(span) span.textContent = p.en;
      }
    }
    if(ok) correct++;
  });
  const rate = Math.round((correct/total)*100);
  qs.scoreArea.textContent = `この大問の得点：${correct} / ${total}（${rate}%）`;

　// ★採点後：入力欄をロック
  qs.questionList.querySelectorAll('.answer-input').forEach(inp=>{
    inp.disabled = true;
  });
}

function clearInputs(){
  const d = data[idx];
  d.problems.forEach((_,i)=>{ answers[keyFor(i)]=''; judged[keyFor(i)]=undefined; });
  render();
}

qs.prevBtn.addEventListener('click', ()=>{
  if(!viewIndices || viewIndices.length===0) rebuildView();
  viewPos = Math.max(0, viewPos - 1);
  idx = viewIndices[viewPos];
  render();
});

qs.nextBtn.addEventListener('click', ()=>{
  if(!viewIndices || viewIndices.length===0) rebuildView();
  viewPos = Math.min(viewIndices.length - 1, viewPos + 1);
  idx = viewIndices[viewPos];
  render();
});

// 音声 ON/OFF
voiceEnabled = !!qs.voiceOn.checked;
qs.voiceOn.addEventListener('change', ()=>{
  voiceEnabled = !!qs.voiceOn.checked;
  if(!voiceEnabled && ('speechSynthesis' in window)) speechSynthesis.cancel();
});

qs.daimonSelect.addEventListener('change', e=>{
  idx = parseInt(e.target.value||'0',10)||0;
  if(!viewIndices || viewIndices.length===0) rebuildView();
  viewPos = viewIndices.indexOf(idx);
  if(viewPos < 0) viewPos = 0;
  render();
});

['showBank','showHint','numReset'].forEach(id=>{ qs[id].addEventListener('change', ()=> render()); });

qs.fileInput.addEventListener('change', async (e)=>{
  const file = e.target.files?.[0]; if(!file) return;
  const text = await file.text();
  try{
    const parsed = JSON.parse(text);
    if(!Array.isArray(parsed)) throw new Error('最上位は配列にしてください');
    data = parsed; answers = {}; judged = {}; idx = 0; render();
  }catch(err){ alert('JSONの読み込みに失敗しました：' + err.message); }
  e.target.value = '';
});

qs.checkBtn.addEventListener('click', doJudge);
qs.clearBtn.addEventListener('click', clearInputs);
qs.printBtn.addEventListener('click', ()=> window.print());

document.addEventListener('keydown', (ev)=>{
  if(ev.key === 'ArrowLeft'){ qs.prevBtn.click(); }
  if(ev.key === 'ArrowRight'){ qs.nextBtn.click(); }
  if((ev.ctrlKey || ev.metaKey) && ev.key === 'Enter'){ doJudge(); }
});

render();
</script>
</body>
</html>
